<svg width="1032" height="336" viewBox="0 0 1032 336" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fdf6f3" />
  
  <!-- Encabezado -->
  <text x="50%" y="55" font-family="Segoe UI, Roboto, sans-serif" font-size="28" font-weight="bold" fill="#5c3d2e" text-anchor="middle" letter-spacing="1">BUNNYCURE LOYALTY</text>
  <text x="50%" y="85" font-family="Segoe UI, Roboto, sans-serif" font-size="14" fill="#9e7b6e" text-anchor="middle">Colecciona 10 sellos y reclama tu beneficio</text>

  <defs>
    <!-- Icono Conejo Lucide Style -->
    <symbol id="bunny" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M13 16a3 3 0 0 1 2.24 5M18 10.5V6a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3v4.5M10 10.5a1.5 1.5 0 1 0 3 0 1.5 1.5 0 0 0-3 0ZM6 10.5h12c1.7 0 3 1.3 3 3v3.5a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-3.5c0-1.7 1.3-3 3-3ZM10 16a3 3 0 0 0-2.24 5"/>
    </symbol>
    
    <!-- Estado: Sello Completado -->
    <g id="sello-ok">
      <circle cx="0" cy="0" r="35" fill="#c9897a" stroke="#7c3a2d" stroke-width="2" />
      <use href="#bunny" x="-20" y="-20" width="40" height="40" color="#ffffff" />
    </g>
    
    <!-- Estado: Sello Pendiente -->
    <g id="sello-off">
      <circle cx="0" cy="0" r="35" fill="#f0f0f0" stroke="#d1d1d1" stroke-width="1.5" />
      <use href="#bunny" x="-20" y="-20" width="40" height="40" color="#d1d1d1" />
    </g>
  </defs>

  <!-- Grilla de 10 Sellos (2 filas de 5) -->
  <g transform="translate(196, 140)">
    <use href="#sello-ok" x="0" y="0" />
    <use href="#sello-ok" x="160" y="0" />
    <use href="#sello-ok" x="320" y="0" />
    <use href="#sello-ok" x="480" y="0" />
    <use href="#sello-ok" x="640" y="0" />
    <use href="#sello-ok" x="0" y="90" />
    <use href="#sello-off" x="160" y="90" />
    <use href="#sello-off" x="320" y="90" />
    <use href="#sello-off" x="480" y="90" />
    <use href="#sello-off" x="640" y="90" />
  </g>

  <!-- Pie de página dinámico con Premio -->
  <rect x="230" y="275" width="572" height="40" rx="20" fill="#ffffff" stroke="#f0e0d8" />
  <text x="50%" y="301" font-family="Segoe UI, Roboto, sans-serif" font-size="15" font-weight="bold" fill="#7c3a2d" text-anchor="middle">
    6/10 SELLOS — PRÓXIMO: MANICURE EXPRESS GRATIS
  </text>
</svg>